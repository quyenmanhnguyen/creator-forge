name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  research-python:
    name: Research sidecar — ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx
          # Sidecar-runtime deps that the API routes import at module load.
          # Heavy stack (moviepy, edge-tts, mutagen, plotly) is still not
          # needed for ruff + the API tests; tighten as more routes are wired.
          pip install fastapi uvicorn pydantic python-dotenv requests \
                      langdetect openai vaderSentiment \
                      google-api-python-client pytrends pandas \
                      youtube-transcript-api yt-dlp

      - name: Ruff lint
        run: ruff check research

      - name: Compile-check every Python file
        run: python -m compileall -q research

      - name: Pytest — API tests (must pass)
        run: pytest research/tests/test_api_niche.py research/tests/test_api_keywords.py research/tests/test_api_outlier.py research/tests/test_api_cloner.py research/tests/test_api_studio.py research/tests/test_api_producer.py -v --no-header

      - name: Pytest — legacy tube-atlas tests (best-effort)
        run: |
          # Many tube-atlas tests need heavy deps (moviepy, edge-tts, etc.)
          # not installed in this minimal CI image — run them best-effort
          # and surface failures as warnings until each is ported.
          pytest research/tests -q --no-header \
            --ignore=research/tests/test_api_niche.py \
            --ignore=research/tests/test_api_keywords.py \
            --ignore=research/tests/test_api_outlier.py \
            --ignore=research/tests/test_api_cloner.py \
            --ignore=research/tests/test_api_studio.py \
            --ignore=research/tests/test_api_producer.py \
            --ignore=research/tests/test_pixelle_comfyui_image.py \
            --ignore=research/tests/test_pixelle_subtitles.py \
            --ignore=research/tests/test_pixelle_composer.py \
            --ignore=research/tests/test_pixelle_tts.py \
            --ignore=research/tests/test_pixelle_tts_timing.py || \
            echo "::warning::legacy pytest had failures — tracked, not blocking"

  desktop-node:
    name: Desktop shell — node syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root deps
        run: npm install --no-audit --no-fund || true

      - name: Syntax check Electron entry points
        run: |
          node --check desktop/electron/main.js
          node --check desktop/electron/preload.js
          node --check desktop/electron/researchSidecar.js
          node --check desktop/electron/researchIPC.js
          for f in desktop/src/bridges/*.js; do node --check "$f"; done
          for f in desktop/src/services/*.js; do node --check "$f"; done
