<body>
        <div id="root"></div>
<script>
// Inject Image Count selector into config panel
(function() {
    window.__imageCount = 4; // default

    function injectImageCountDropdown() {
        // Find the Aspect Ratio label/select container
        const allLabels = document.querySelectorAll('label');
        let aspectLabel = null;
        for (const l of allLabels) {
            if (l.textContent && l.textContent.includes('Aspect Ratio')) {
                aspectLabel = l;
                break;
            }
        }

        if (!aspectLabel || document.getElementById('image-count-container')) return;

        // Create container matching the existing style
        const container = document.createElement('div');
        container.id = 'image-count-container';
        container.style.cssText = 'margin-top: 12px; display: flex; align-items: center; gap: 10px;';

        const label = document.createElement('label');
        label.textContent = 'Số lượng ảnh:';
        label.style.cssText = 'color: var(--text-secondary); font-size: 12px; font-weight: 500; white-space: nowrap; min-width: 90px;';

        const select = document.createElement('select');
        select.id = 'image-count-select';
        select.style.cssText = 'background: var(--bg-primary); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 12px; font-size: 13px; cursor: pointer; flex: 1; outline: none; transition: border-color 0.3s, box-shadow 0.3s;';

        [1, 2, 4].forEach(n => {
            const opt = document.createElement('option');
            opt.value = n;
            opt.textContent = n + (n === 4 ? ' (mặc định)' : '');
            if (n === 4) opt.selected = true;
            select.appendChild(opt);
        });

        select.addEventListener('change', () => {
            window.__imageCount = parseInt(select.value, 10);
            console.log('[UI] Image count set to:', window.__imageCount);
        });

        select.addEventListener('focus', () => {
            select.style.borderColor = 'var(--accent)';
            select.style.boxShadow = '0 0 12px rgba(0,229,255,0.15)';
        });
        select.addEventListener('blur', () => {
            select.style.borderColor = 'rgba(255,255,255,0.1)';
            select.style.boxShadow = 'none';
        });

        container.appendChild(label);
        container.appendChild(select);

        // Insert after the aspect ratio section
        const aspectParent = aspectLabel.closest('div') || aspectLabel.parentElement;
        if (aspectParent && aspectParent.parentElement) {
            aspectParent.parentElement.insertBefore(container, aspectParent.nextSibling);
        }
    }

    // Hook into image:generate to inject imageGenerationCount
    function hookGenerate() {
        if (!window.electronAPI?.image?.generate) return false;
        if (window.__generateHooked) return true;
        const origGenerate = window.electronAPI.image.generate;
        window.electronAPI.image.generate = function(params) {
            if (params && params.config) {
                params.config.imageGenerationCount = window.__imageCount || 4;
            } else if (params) {
                params.config = { imageGenerationCount: window.__imageCount || 4 };
            }
            console.log('[UI] Generating with imageCount:', window.__imageCount || 4);
            return origGenerate(params);
        };
        window.__generateHooked = true;
        return true;
    }

    // Try injecting periodically until React has rendered
    let attempts = 0;
    const interval = setInterval(() => {
        injectImageCountDropdown();
        hookGenerate();
        attempts++;
        if (document.getElementById('image-count-container') && window.__generateHooked || attempts > 60) {
            clearInterval(interval);
        }
    }, 1000);
})();
</script>
